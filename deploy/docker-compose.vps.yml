name: youtube-manager

services:
  db:
    image: postgres:16-alpine
    container_name: ytm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ytm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ytm-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FRONTEND_URL: https://${APP_DOMAIN}
      DEBUG: "false"
      AUTO_INIT_DB: "true"
      SERVE_FRONTEND: "true"
      FRONTEND_DIR: ../frontend
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      YOUTUBE_HTTP_TIMEOUT_SECONDS: ${YOUTUBE_HTTP_TIMEOUT_SECONDS}
      CRAWL_TASK_MAX_CONCURRENCY: ${CRAWL_TASK_MAX_CONCURRENCY}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
    expose:
      - "8000"
    networks:
      - default
      - shared_proxy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  ytm_postgres_data:

networks:
  shared_proxy:
    external: true
    name: shared_proxy
